<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ANDI-CLI test fixture — deliberate 508 violations</title>
</head>
<body>
  <h1>Test fixture</h1>
  <p>This page intentionally contains Section 508 / WCAG violations for ANDI-CLI to detect.</p>

  <!-- image with no alt text -->
  <img src="logo.png" width="80" height="80">

  <!-- input with no associated label -->
  <input type="text" placeholder="Email address">

  <!-- button with no accessible name -->
  <button></button>

  <!-- link with no accessible name -->
  <a href="/account"></a>

  <!-- low contrast text -->
  <p style="color:#cfcfcf;background:#dddddd">Low-contrast paragraph that fails contrast checks.</p>

  <!-- data table with no headers -->
  <table>
    <tr><td>Jan</td><td>100</td></tr>
    <tr><td>Feb</td><td>120</td></tr>
  </table>
</body>
</html>
