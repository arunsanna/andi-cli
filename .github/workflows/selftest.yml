name: Self-test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  selftest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run test suite
        run: npm test

      - name: Dogfood — clean fixture exits 0
        run: |
          node src/cli.cjs \
            --url "file://$PWD/test/fixtures/clean.html" \
            --module all \
            --fail-on danger

      - name: Dogfood — violation fixture triggers gate (exit non-zero)
        run: |
          if node src/cli.cjs \
               --url "file://$PWD/test/fixtures/focusable.html" \
               --module f \
               --fail-on danger; then
            echo "ERROR: gate should have failed on focusable.html but exited 0"
            exit 1
          else
            echo "gate correctly failed (exit $?)"
          fi

      - name: SARIF smoke — output file is valid JSON
        run: |
          node src/cli.cjs \
            --url "file://$PWD/test/fixtures/clean.html" \
            --module all \
            --fail-on none \
            --sarif andi.sarif
          test -f andi.sarif
          node -e "JSON.parse(require('fs').readFileSync('andi.sarif','utf8')); console.log('SARIF is valid JSON');"
