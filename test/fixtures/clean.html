<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ANDI-CLI clean fixture — zero 508 violations</title>
</head>
<body>
  <h1>Clean fixture</h1>
  <p>This page is intentionally free of Section 508 / WCAG violations.</p>

  <!-- focusable: button with accessible name -->
  <button type="button">Submit form</button>

  <!-- focusable: link with accessible name via innerText -->
  <a href="/home">Return to home</a>

  <!-- focusable: input with associated label (for/id pairing) -->
  <label for="email-input">Email address</label>
  <input type="text" id="email-input" name="email">

  <!-- graphics: image with descriptive alt text -->
  <img src="data:image/gif;base64,R0lGODlhAQABAAAAACw=" alt="One-pixel placeholder graphic">

  <!-- contrast: text with sufficient contrast (black on white) -->
  <p style="color:#000000;background:#ffffff">This text has sufficient contrast.</p>

  <!-- tables: data table with proper headers -->
  <table>
    <thead>
      <tr>
        <th scope="col">Month</th>
        <th scope="col">Value</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>January</td>
        <td>100</td>
      </tr>
      <tr>
        <td>February</td>
        <td>120</td>
      </tr>
    </tbody>
  </table>

  <!-- iframes: iframe with accessible title -->
  <iframe src="about:blank" title="Example embedded content" width="200" height="100"></iframe>

  <!-- structures: proper heading hierarchy (no role=heading without aria-level) -->
  <h2>Section heading</h2>
  <p>Section content.</p>
</body>
</html>
