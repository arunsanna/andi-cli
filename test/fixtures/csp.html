<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CSP bypass fixture</title>
  <!-- PLANTED CSP: restrictive meta Content-Security-Policy blocks inline scripts.
       Without bypassCSP:true, ANDI injection would be refused.
       scanModule always uses bypassCSP:true (Decision 3) so injection succeeds. -->
  <meta http-equiv="Content-Security-Policy" content="script-src 'self'">
</head>
<body>
  <h1>CSP fixture</h1>
  <!-- PLANTED VIOLATION: button with no accessible name → danger (focusable module).
       Proves bypassCSP:true lets ANDI inject and detect violations even under meta CSP. -->
  <button></button>
</body>
</html>
